<h1 id="picture-tag-different-pics">Picture-Tag - different&nbsp;pics</h1>
<p><a href="/responsiveImages/picture_tag.html">Go to “Picture-Tag”</a>
<a href="/responsiveImages/index.html#/jump_back">Return to&nbsp;presentation</a></p>
<pre><code class="lang-css"><span class="tag">img</span> <span class="rules">{
<span class="rule"><span class="attribute">max-width</span>:<span class="value"> <span class="number">100</span>%</span></span>;
<span class="rule"><span class="attribute">height</span>:<span class="value"> auto</span></span>;
<span class="rule">}</span></span>
</code></pre>
<pre><code class="lang-html"><span class="tag">&lt;<span class="title">picture</span>&gt;</span>
  <span class="tag">&lt;<span class="title">source</span> <span class="attribute">media</span>=<span class="value">"(min-width: 800px)"</span> <span class="attribute">srcset</span>=<span class="value">"slideshow_large.jpg"</span> &gt;</span>
  <span class="tag">&lt;<span class="title">source</span> <span class="attribute">media</span>=<span class="value">"(min-width: 400px)"</span> <span class="attribute">srcset</span>=<span class="value">"buecher.jpg"</span> &gt;</span>
  <span class="tag">&lt;<span class="title">img</span> <span class="attribute">src</span>=<span class="value">"comedia.jpg"</span> /&gt;</span>
<span class="tag">&lt;/<span class="title">picture</span>&gt;</span>
</code></pre>
<picture>
  <source media="(min-width: 800px)" srcset="slideshow_large.jpg" >
  <source media="(min-width: 400px)" srcset="buecher.jpg" >
  <img src="comedia.jpg" />
</picture>
