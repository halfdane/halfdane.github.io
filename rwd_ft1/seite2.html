<!DOCTYPE html>
<html>

  <body class="rwd_order grid">
    <div class="sizeDisplayLOL">
      <div class="small">small</div>
      <div class="medium">medium</div>
      <div class="large">large</div>
      <div class="extra_large">extra_large</div>

    <div id="content">
      <h1>Seite 2</h1>

      <div>Alle bekommen eine neue Seite, wenn sie hier hin klicken</div>
      <button href="seite3.html" class="withRedirect">Button</button>

    <script>
      $(document).ready(function() {
            $(".withRedirect").each(function() {
                var $link = $(this);
                $link.click(function() {
                window.location = $link.attr('href');

			          return false;
		          });
              
            });
      });
    </script>
