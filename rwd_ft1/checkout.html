    <script>
      $(document).ready(function() {
            $(".openInDialog").each(function() {
              var $link = $(this);
		          var $dialog = $('<div></div>')
			          .load($link.attr('href'))
			          .dialog({
				          autoOpen: false,
			          });

		          $link.click(function() {
			          $dialog.dialog('open');

			          return false;
		          });
            });
      });
    </script>
