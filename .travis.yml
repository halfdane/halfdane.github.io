  only:
    - develop
before_install:
- travis_retry gem install jekyll
script:
  - jekyll build

after_success:
  - echo "$REPO_URL"
  - cd _site
  - git status
  - git add -f --all
  - git config --global user.email "halfdane@gmx.net"
  - git config --global user.name "halfdane"
  - git commit -m "snapshot $(date '+%m/%d/%y %H:%M')"
  - git push https://${GH_TOKEN}@github.com/halfdane/halfdane.github.io master
  - cd ..
